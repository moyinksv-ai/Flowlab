<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FlowLab — Create Account</title>
  <meta name="theme-color" content="#0A0812">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-box">

    <div class="auth-logo">
      <div class="wordmark">Flow<span>Lab</span></div>
      <p>Create your producer account</p>
    </div>

    <!-- Error / success banners.
         This page must work correctly whether Supabase "Confirm email"
         is ON or OFF — both branches are handled by inspecting what
         signUp() actually returns at runtime, not by assuming either state. -->
    <div id="signup-error"   class="inline-error"   role="alert"></div>
    <div id="signup-success" class="inline-success" role="status"></div>

    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Your name" autocomplete="name" required>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="producer@label.com" autocomplete="email" required>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" required>
    </div>

    <div class="form-group">
      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="Repeat password" autocomplete="new-password" required>
    </div>

    <button id="signup-btn" class="btn btn-primary btn-full" type="button">Create Account</button>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<script src="genres.js"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
<script>
  const signupBtn = document.getElementById('signup-btn');

  async function handleSignup() {
    clearError('signup-error');
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm-password').value;

    if (!name || !email || !password || !confirm) {
      showError('signup-error', 'All fields are required.');
      return;
    }
    if (password.length < 8) {
      showError('signup-error', 'Password must be at least 8 characters.');
      return;
    }
    if (password !== confirm) {
      showError('signup-error', 'Passwords do not match.');
      return;
    }

    const restore = withButtonLoading(signupBtn, 'Creating account…');

    let data, error;
    try {
      ({ data, error } = await window.supabase.auth.signUp({
        email,
        password,
        options: { data: { name } }
      }));
    } catch (err) {
      // signUp() can REJECT, not just resolve with {error} — auth-js's
      // _saveSession() calls storage.setItem() with no try/catch of its
      // own. If that throws (blocked storage, quota, private-mode
      // restrictions, etc.) it isn't an AuthError, so signUp()'s internal
      // catch block re-throws it instead of returning it. Without this
      // try/catch, restore() below never runs and the button is stuck on
      // "Creating account…" forever — which is the exact bug in the
      // screenshot.
      console.error('signUp() threw:', err);
      showError('signup-error', `Unexpected error: ${err.message || err}`);
      return;
    } finally {
      restore();
    }

    // Branch on what signUp() actually returns — never assume which
    // Supabase Auth setting ("Confirm email" on/off) is active.

    if (error) {
      // e.g. "User already registered", "Password should be at least 6 characters"
      showError('signup-error', error.message);
      return;
    }

    if (data.session) {
      // "Confirm email" is OFF for this project — user has an active session immediately.
      location.href = 'dashboard.html';
      return;
    }

    // "Confirm email" is ON — user must verify before logging in.
    showSuccess(
      'signup-success',
      'Account created — check your email to confirm, then log in.'
    );
    signupBtn.disabled = true;
    setTimeout(() => { location.href = 'login.html'; }, 3500);
  }

  signupBtn.addEventListener('click', handleSignup);

  document.querySelectorAll('input').forEach(el => {
    el.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSignup(); });
  });
</script>

</body>
</html>
